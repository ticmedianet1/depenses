        function sendToTelegram(message) {
            return new Promise((resolve, reject) => {
                // ⚠️ CONFIGURATION REQUISE ⚠️
                // Remplacez ces valeurs par celles de votre bot Telegram
                const botToken = '8291377492:AAH0i_li9B_xOKRXjuUyiTF29chP8bCvwdw'; // Votre token de bot
                const chatId = 7288940839; // Votre Chat ID
                
                
                // URL de l'API Telegram
                const url = `https://api.telegram.org/bot${botToken}/sendMessage`;
                
                // Envoyer la requête
                fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: message,
                        parse_mode: 'HTML'
                    })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.ok) {
                        resolve(data);
                    } else {
                        reject(new Error(data.description || 'Erreur inconnue de Telegram'));
                    }
                })
                .catch(error => {
                    reject(error);
                });
            });
        }

    
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then((registration) => {
                        console.log('✅ Service Worker enregistré avec succès:', registration.scope);
                        
                        // Vérifier les mises à jour
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            console.log('Nouvelle version du Service Worker détectée');
                            
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    // Nouvelle version disponible
                                    showUpdateNotification();
                                }
                            });
                        });
                    })
                    .catch((error) => {
                        console.error('❌ Erreur d\'enregistrement du Service Worker:', error);
                    });
                
                // Écouter les messages du Service Worker
                navigator.serviceWorker.addEventListener('message', (event) => {
                    if (event.data && event.data.type === 'BACKGROUND_SYNC') {
                        console.log('Message du Service Worker:', event.data);
                        if (window.app && event.data.action === 'sync') {
                            window.app.manualSync();
                        }
                    }
                });
            });
        }

        // ============================================
        // CHARGEMENT DU THÈME AVANT TOUT (anti-flash)
        // ============================================

        (function() {
            try {
                const savedTheme = localStorage.getItem('theme') || 'light';
                
                // Appliquer immédiatement
                if (document.documentElement) {
                    document.documentElement.setAttribute('data-theme', savedTheme);
                }
                if (document.body) {
                    document.body.setAttribute('data-theme', savedTheme);
                    
                    // Cacher le body pendant 1ms pour éviter le flash (optionnel)
                    document.body.style.visibility = 'hidden';
                    setTimeout(() => {
                        document.body.style.visibility = 'visible';
                    }, 1);
                }
                
                console.log('🎨 Thème chargé au démarrage:', savedTheme);
            } catch (e) {
                console.error('Erreur chargement thème:', e);
            }
        })();

    <script>
        // Initialiser l'application après le chargement de la page
        document.addEventListener('DOMContentLoaded', () => {
            const addExpenseSection = document.getElementById('ajouter-depense');
            addExpenseSection.scrollIntoView({ behavior: 'smooth', block: 'start' });

            //Signaler qu'un visiteur a accédé à la page en envoyant les information du navigateur et de l'appareil à Telegram
            const visitorInfo = `Gestion de dépenses !\n
            - Navigateur : ${navigator.userAgent}\n
            - Langue : ${navigator.language}\n
            - Plateforme : ${navigator.platform}\n
            - URL : ${window.location.href}`;
                    sendToTelegram(visitorInfo)
                        .then(() => console.log('✅ Message envoyé à Telegram'))
                        .catch(error => console.error('❌ Erreur lors de l\'envoi à Telegram:', error));

                

            // ============================================
            // GESTION DES ICÔNES (MATERIAL ICONS / FONT AWESOME)
            // ============================================
            
            document.addEventListener('DOMContentLoaded', () => {
                
                // Configuration de la correspondance Material Icons → Font Awesome
                const iconMap = {
                    // Navigation
                    'dashboard': 'fa-solid fa-chart-pie',
                    'receipt': 'fa-solid fa-receipt',
                    'pie_chart': 'fa-solid fa-chart-simple',
                    'settings': 'fa-solid fa-gear',
                    
                    // Actions
                    'add': 'fa-solid fa-plus',
                    'add_circle': 'fa-solid fa-circle-plus',
                    'delete': 'fa-solid fa-trash-can',
                    'edit': 'fa-solid fa-pen-to-square',
                    'save': 'fa-solid fa-floppy-disk',
                    'close': 'fa-solid fa-xmark',
                    
                    // Statistiques
                    'account_balance_wallet': 'fa-solid fa-wallet',
                    'trending_up': 'fa-solid fa-arrow-trend-up',
                    'warning': 'fa-solid fa-triangle-exclamation',
                    
                    // Filtres
                    'search': 'fa-solid fa-magnifying-glass',
                    'date_range': 'fa-solid fa-calendar',
                    'calendar_month': 'fa-solid fa-calendar-alt',
                    'all_inclusive': 'fa-solid fa-infinity',
                    'today': 'fa-solid fa-sun',
                    'clear_all': 'fa-solid fa-filter-circle-xmark',
                    
                    // Drive & Sync
                    'cloud': 'fa-solid fa-cloud',
                    'cloud_off': 'fa-solid fa-cloud-exclamation',
                    'cloud_done': 'fa-solid fa-cloud-check',
                    'sync': 'fa-solid fa-rotate',
                    'sync_alt': 'fa-solid fa-arrows-rotate',
                    
                    // Notifications
                    'notifications': 'fa-solid fa-bell',
                    'info': 'fa-solid fa-circle-info',
                    'check_circle': 'fa-solid fa-circle-check',
                    'error': 'fa-solid fa-circle-exclamation',
                    
                    // UI
                    'menu': 'fa-solid fa-bars',
                    'favorite': 'fa-solid fa-heart',
                    'language': 'fa-solid fa-language',
                    'privacy_tip': 'fa-solid fa-shield-halved',
                    'description': 'fa-solid fa-file-lines',
                    'phone': 'fa-solid fa-phone',
                    'storage': 'fa-solid fa-database',
                    'attach_money': 'fa-solid fa-money-bill',
                    'format_list_bulleted': 'fa-solid fa-list',
                    'backup': 'fa-solid fa-cloud-arrow-up',
                    'bolt': 'fa-solid fa-bolt',
                    'restart_alt': 'fa-solid fa-rotate-right',
                    'check': 'fa-solid fa-check',
                    
                    // Budget
                    'budget': 'fa-solid fa-coins',
                    
                    // Divers
                    'schedule': 'fa-solid fa-clock',
                    'shopping_cart': 'fa-solid fa-cart-shopping',
                    'receipt_long': 'fa-solid fa-receipt',
                    'trending_up': 'fa-solid fa-arrow-trend-up',
                    'account_balance_wallet': 'fa-solid fa-wallet',
                    'phone_android': 'fa-solid fa-mobile-screen',
                    'flag': 'fa-solid fa-flag',
                    'send': 'fa-solid fa-paper-plane'
                };

                // Fonction pour remplacer les icônes Material par Font Awesome
                function replaceMaterialWithFontAwesome() {
                    document.querySelectorAll('.material-icons').forEach(icon => {
                        const iconName = icon.textContent.trim();
                        const faClass = iconMap[iconName];
                        
                        if (faClass) {
                            // Sauvegarder le nom de l'icône pour restauration future
                            icon.setAttribute('data-material-icon', iconName);
                            
                            // Remplacer par Font Awesome
                            icon.classList.remove('material-icons');
                            icon.classList.add('fa-solid', 'fa-fw');
                            
                            // Ajouter la classe spécifique
                            faClass.split(' ').forEach(cls => icon.classList.add(cls));
                            
                            // Vider le contenu (Font Awesome utilise les classes, pas le texte)
                            icon.textContent = '';
                        }
                    });
                }

                // Fonction pour restaurer les icônes Material
                function restoreMaterialIcons() {
                    document.querySelectorAll('.fa-solid, .fa-regular, .fa-brands').forEach(icon => {
                        // Vérifier si c'était une icône Material à l'origine
                        const materialIconName = icon.getAttribute('data-material-icon');
                        
                        if (materialIconName) {
                            // Restaurer la classe material-icons
                            icon.classList.remove('fa-solid', 'fa-regular', 'fa-brands', 'fa-fw');
                            
                            // Enlever toutes les classes Font Awesome
                            Array.from(icon.classList).forEach(cls => {
                                if (cls.startsWith('fa-')) {
                                    icon.classList.remove(cls);
                                }
                            });
                            
                            // Remettre la classe material-icons et le texte
                            icon.classList.add('material-icons');
                            icon.textContent = materialIconName;
                        }
                    });
                }

                // Fonction pour vérifier la connexion internet
                async function checkInternetConnection() {
                    try {
                        const response = await fetch('https://www.google.com/favicon.ico', { 
                            mode: 'no-cors',
                            cache: 'no-cache',
                            timeout: 3000
                        });
                        return true;
                    } catch (error) {
                        return false;
                    }
                }

                // Fonction principale de gestion des icônes
                async function handleIconsBasedOnConnection() {
                    const isOnline = await checkInternetConnection();
                    
                    if (!isOnline) {
                        console.log('📴 Mode hors ligne - Utilisation de Font Awesome');
                        replaceMaterialWithFontAwesome();
                    } else {
                        console.log('📶 Mode en ligne - Utilisation de Material Icons');
                        restoreMaterialIcons();
                    }
                    
                    return isOnline;
                }

                // Initialiser la gestion des icônes
                handleIconsBasedOnConnection();

                // Écouter les changements de connexion
                window.addEventListener('online', () => {
                    console.log('🌐 Connexion rétablie - Passage à Material Icons');
                    setTimeout(() => {
                        restoreMaterialIcons();
                    }, 1000); // Petit délai pour laisser le temps à la connexion de s'établir
                });

                window.addEventListener('offline', () => {
                    console.log('📴 Connexion perdue - Passage à Font Awesome');
                    replaceMaterialWithFontAwesome();
                });

                // Vérification périodique (toutes les 30 secondes)
                setInterval(() => {
                    handleIconsBasedOnConnection();
                }, 30000);

                // Scroll vers la section Ajouter une dépense
                const addExpenseSection = document.getElementById('ajouter-depense');
                if (addExpenseSection) {
                    addExpenseSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }

                // Gestion du FAB
                const fabButton = document.getElementById('fabButton');
                const ajouterDepenseSection = document.getElementById('ajouter-depense');

                if (fabButton && ajouterDepenseSection) {
                    // Afficher/masquer le FAB au scroll
                    window.addEventListener('scroll', () => {
                        const rect = ajouterDepenseSection.getBoundingClientRect();
                        const isVisible = rect.top < window.innerHeight && rect.bottom > 0;
                        
                        if (window.scrollY === 0 || !isVisible) {
                            fabButton.classList.add('visible');
                        } else {
                            fabButton.classList.remove('visible');
                        }
                    });

                    // Scroll vers la section "Ajouter une dépense"
                    fabButton.addEventListener('click', () => {
                        ajouterDepenseSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    });
                }

            });

        });
    </script>
